name: my_tube
description: "A Flutter mobile application built around a persistent WebView experience with background and PiP support."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0

  # Background Execution
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2

  # Lock Screen / Wake Lock
  wakelock_plus: ^1.2.5

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Storage (bookmarks, settings)
  shared_preferences: ^2.2.3

  # UI Extras
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.7

  # Additional utilities
  google_fonts: ^6.3.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
